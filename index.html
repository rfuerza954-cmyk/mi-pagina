<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mi pagina web</title>

    <style>
        body {
            background-color: pink;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
            overflow: hidden;
        }

        button {
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background-color: #ff4d6d;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #c9184a;
        }

        #mensaje {
            font-size: 40px;
            margin-top: 30px;
        }

        .corazon {
            position: fixed;
            top: -10px;
            font-size: 24px;
            animation: caer linear infinite;
        }

        @keyframes caer {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>

    <h1>Mi pagina web</h1>

    <button onclick="mostrar()">Presiona aqui</button>

    <p id="mensaje"></p>

    <script>
        function mostrar() {
            document.getElementById("mensaje").innerHTML = "I LOVE ❤️";
        }

        function crearCorazon() {
            const corazon = document.createElement("div");
            corazon.classList.add("corazon");
            corazon.innerHTML = "❤️";
            corazon.style.left = Math.random() * 100 + "vw";
            corazon.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(corazon);

            setTimeout(() => {
                corazon.remove();
            }, 5000);
        }

        setInterval(crearCorazon, 300);
    </script>

</body>
</html>
